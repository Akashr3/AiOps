apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: kube-system
  labels:
    k8s-app: filebeat
data:
  filebeat.yml: |-
    cloud.id: "277340234b1c4a65831e00bcc15929fd:dXMtY2VudHJhbDEuZ2NwLmNsb3VkLmVzLmlvOjQ0MyQ0NzRlZTkxYzNlMmQ0MDc4YTJhYzdmN2RhN2YwMTZjNCRiMjIzMDk5ZjA0MDU0ZjVhOGEzMjIwOGYxNjFiZjAxZg=="
    cloud.auth: "elastic:${ELASTICSEARCH_PASSWORD}"

    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log
      # This tells Filebeat to parse the CRI format (timestamp stdout/stderr F message)
      parsers:
        - container:
            stream: all
            format: auto
      processors:
        # After CRI parsing, the actual log is in 'message' field
        # Now decode JSON from the message field
        - decode_json_fields:
            fields: ["message"]
            target: ""
            overwrite_keys: true
            add_error_key: false
            max_depth: 10
            when:
              regexp:
                message: '^\{.*\}$'
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
        - add_cloud_metadata: ~
        # Drop the raw message field to avoid duplication
        - drop_fields:
            fields: ["message"]
            ignore_missing: true

    output.elasticsearch: {}

    setup.kibana:
      cloud.id: "277340234b1c4a65831e00bcc15929fd:dXMtY2VudHJhbDEuZ2NwLmNsb3VkLmVzLmlvOjQ0MyQ0NzRlZTkxYzNlMmQ0MDc4YTJhYzdmN2RhN2YwMTZjNCRiMjIzMDk5ZjA0MDU0ZjVhOGEzMjIwOGYxNjFiZjAxZg=="
      cloud.auth: "elastic:${ELASTICSEARCH_PASSWORD}"

    logging.to_stderr: true
    logging.level: debug
    logging.selectors: ["elasticsearch", "publish"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "watch", "list"]

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: kube-system
  labels:
    k8s-app: filebeat
spec:
  selector:
    matchLabels:
      k8s-app: filebeat
  template:
    metadata:
      labels:
        k8s-app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:8.12.2
        args: ["-c", "/etc/filebeat.yml", "-e"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: elastic-cloud-credentials
              key: password
        securityContext:
          runAsUser: 0
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: config
          mountPath: /etc/filebeat.yml
          readOnly: true
          subPath: filebeat.yml
        - name: data
          mountPath: /usr/share/filebeat/data
        - name: varlogcontainers
          mountPath: /var/log/containers
          readOnly: true
        - name: varlogpods
          mountPath: /var/log/pods
          readOnly: true
      volumes:
      - name: config
        configMap:
          defaultMode: 0600
          name: filebeat-config
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: data
        hostPath:
          path: /var/lib/filebeat-data
          type: DirectoryOrCreate
